<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Evidencias</title>
    <!-- Incluimos nuestra hoja de estilos -->
    <link rel="stylesheet" href="css/styles.css">
    <!-- Fuente moderna desde Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="login-container">
        <!-- Formulario principal con ID para manipularlo desde JavaScript -->
        <form id="loginForm" class="login-form" novalidate>
            <h2>Iniciar Sesión</h2>
            <p class="subtitle">Bienvenido de nuevo, por favor ingresa tus datos.</p>

            <!-- Grupo de correo electrónico -->
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" placeholder="admin@mail.com">
                <div id="emailError" class="error-message"></div>
            </div>

            <!-- Grupo de contraseña -->
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="********">
                <div id="passwordError" class="error-message"></div>
            </div>

            <!-- Botón de envío -->
            <button type="submit" id="submitBtn">Ingresar</button>

            <!-- Contenedor para mensajes globales (éxito o error de credenciales) -->
            <div id="globalMessage" class="global-message"></div>
        </form>
    </div>

    <!-- Incluimos la lógica de JavaScript -->
    <script src="js/script.js"></script>
</body>

    </html>
